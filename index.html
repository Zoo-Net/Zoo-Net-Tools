<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoo-Net Tools</title>

    <link rel="preconnect" href="https://cdn.staticfile.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.staticfile.net">

    <script>
        function loadLibrary(name, primaryUrl, fallbackUrl) {
            return new Promise((resolve, reject) => {
                let script = document.createElement('script');
                script.src = primaryUrl;
                script.defer = true;

                let timeoutId = setTimeout(() => {
                    script.onload = script.onerror = null;
                    try { document.head.removeChild(script); } catch(e){}
                    console.warn(`[CDN] ${name} 超时 → 切换备用`);
                    loadFallback();
                }, 2000);

                script.onload = () => {
                    clearTimeout(timeoutId);
                    resolve(name);
                };

                script.onerror = () => {
                    clearTimeout(timeoutId);
                    try { document.head.removeChild(script); } catch(e){}
                    loadFallback();
                };

                function loadFallback() {
                    let fb = document.createElement('script');
                    fb.src = fallbackUrl;
                    fb.defer = true;
                    fb.onload = () => resolve(name);
                    fb.onerror = () => reject(new Error(`${name} 所有节点加载失败`));
                    document.head.appendChild(fb);
                }

                document.head.appendChild(script);
            });
        }

        const libsPromise = Promise.all([
            loadLibrary('QRCode', 'https://cdn.staticfile.net/qrcodejs/1.0.0/qrcode.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'),
            loadLibrary('Html2Canvas', 'https://cdn.staticfile.net/html2canvas/1.4.1/html2canvas.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
        ]).then(() => {
            window.libsReady = true;
        }).catch(err => {
            console.error(err);
            alert("核心资源加载失败，请检查网络后刷新页面");
        });
    </script>

    <style>
        :root {
            --transition-base: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-base: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 1px rgba(0, 0, 0, 0.2);
            --shadow-focus: 0 0 0 4px rgba(0, 122, 255, 0.4);
            --radius-card: 22px;
            --radius-btn: 10px;
            --apple-blue: #007aff;
            --apple-blue-gradient: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            --apple-green: #34c759;

            --bg-page: #e2e2e7;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-input: rgba(255, 255, 255, 0.5);
            --bg-tab: rgba(118, 118, 128, 0.12);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --border-color: rgba(0, 0, 0, 0.1);
            --h2-grad-start: #1d1d1f;
            --h2-grad-end: #434343;
            --tips-text: #86868b;
            --inline-config-bg: rgba(0, 0, 0, 0.03);
            --tab-active-text: #ffffff;
            --qr-info-bg: rgba(255, 255, 255, 0.95);
            --qr-info-text: #000000;
            --qr-info-border: #ffffff;

            /* 清除按钮变量（亮色模式） */
            --clear-btn-bg: rgba(0,0,0,0.08);
            --clear-btn-color: #6e6e73;
            --clear-btn-hover-bg: rgba(0,0,0,0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-page: #1c1c1e;
                --bg-card: rgba(28, 28, 30, 0.75);
                --bg-input: rgba(44, 44, 46, 0.8);
                --bg-tab: rgba(118, 118, 128, 0.24);
                --text-main: #f5f5f7;
                --text-sub: #ebebf5;
                --border-color: rgba(255, 255, 255, 0.15);
                --shadow-base: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.2);
                --h2-grad-start: #f5f5f7;
                --h2-grad-end: #86868b;
                --tips-text: #a1a1a6;
                --inline-config-bg: rgba(255, 255, 255, 0.05);
                --tab-active-text: #1d1d1f;
                --qr-info-bg: #000000;
                --qr-info-text: #ffffff;
                --qr-info-border: #000000;

                /* 暗黑模式清除按钮优化：背景浅灰、× 白色 */
                --clear-btn-bg: rgba(255,255,255,0.12);
                --clear-btn-color: #ffffff;
                --clear-btn-hover-bg: rgba(255,255,255,0.25);
            }
        }

        [data-theme="dark"] {
            --bg-page: #1c1c1e;
            --bg-card: rgba(28, 28, 30, 0.75);
            --bg-input: rgba(44, 44, 46, 0.8);
            --bg-tab: rgba(118, 118, 128, 0.24);
            --text-main: #f5f5f7;
            --text-sub: #ebebf5;
            --border-color: rgba(255, 255, 255, 0.15);
            --shadow-base: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.2);
            --h2-grad-start: #f5f5f7;
            --h2-grad-end: #86868b;
            --tips-text: #a1a1a6;
            --inline-config-bg: rgba(255, 255, 255, 0.05);
            --tab-active-text: #1d1d1f;
            --qr-info-bg: #000000;
            --qr-info-text: #ffffff;
            --qr-info-border: #000000;

            --clear-btn-bg: rgba(255,255,255,0.12);
            --clear-btn-color: #ffffff;
            --clear-btn-hover-bg: rgba(255,255,255,0.25);
        }

        @keyframes containerPop {
            0% { transform: scale(0.97); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes windowShow {
            from { opacity: 0; transform: scale(0.94) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(120deg, var(--bg-page) 0%, var(--bg-page) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: var(--transition-base);
        }

        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-base);
        }

        .theme-toggle-btn:hover { transform: scale(1.1); }

        .container {
            background-color: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-base);
            text-align: center;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            animation: windowShow 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transition: var(--transition-base);
        }

        .brand-logo {
            width: 88px;
            height: 88px;
            object-fit: cover;
            border-radius: 20px;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: var(--transition-base);
        }

        .brand-logo:hover { transform: scale(1.1) rotate(3deg); }

        h2 {
            margin: 0 0 28px 0;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--h2-grad-start) 0%, var(--h2-grad-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tab-container {
            display: flex;
            background-color: var(--bg-tab);
            border-radius: 11.6px;
            padding: 3px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .tab-btn.active {
            background-color: var(--apple-blue);
            color: var(--tab-active-text);
            box-shadow: 0 3px 8px rgba(0, 122, 255, 0.3);
        }

        /* 输入框容器（用于定位清除按钮） */
        .text-input-container {
            position: relative;
            min-height: 140px;
        }

        textarea,
        input[type="text"],
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-family: "SF Mono", "Monaco", "Menlo", "Consolas", "Liberation Mono", "Courier New", monospace;
            outline: none;
            background-color: var(--bg-input);
            transition: var(--transition-base);
            color: var(--text-main);
        }

        select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236e6e73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            padding-right: 36px;
        }

        /* 清除按钮样式（通用，已适配暗黑模式） */
        .clear-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 28px;
            height: 28px;
            background: var(--clear-btn-bg);
            border: none;
            border-radius: 50%;
            font-size: 20px;
            line-height: 1;
            color: var(--clear-btn-color);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: var(--transition-base);
        }

        .clear-btn:hover {
            background: var(--clear-btn-hover-bg);
            transform: scale(1.1);
        }

        /* 核心修复：纯通过 CSS 的焦点伪类和内容类来控制显示 */
        .text-input-container:focus-within .clear-btn,
        .text-input-container.has-content .clear-btn {
            display: flex;
        }

        #custom-backend,
        #custom-shortener,
        #custom-config {
            font-size: 11.6px;
        }

        .grid-row {
            display: flex;
            gap: 14px;
            text-align: left;
        }

        .grid-col {
            flex: 1;
            width: 100%;
        }

        .advanced-toggle {
            text-align: center;
            font-size: 13px;
            color: var(--apple-blue);
            cursor: pointer;
            padding: 11.6px;
            margin-bottom: 16px;
            border-radius: 10px;
            background: rgba(0, 122, 255, 0.08);
            font-weight: 600;
            user-select: none;
            transition: var(--transition-base);
        }

        .advanced-content {
            display: none;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .btn {
            border: none;
            border-radius: var(--radius-btn);
            font-family: var(--font-main);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .primary-btn {
            background: var(--apple-blue-gradient);
            color: white;
            padding: 14px 44px;
            font-size: 16px;
            min-width: 180px;
            display: inline-block;
            box-shadow: 0 4px 11.6px rgba(0, 122, 255, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }

        #sub-result {
            padding: 18px 22px;
            background: rgba(52, 199, 89, 0.08);
            border: 1px solid rgba(52, 199, 89, 0.2);
            border-radius: var(--radius-btn);
            text-align: left;
        }

        .success-flash-blink {
            animation: flashPulse 0.5s ease-out;
        }

        .flash-update {
            animation: containerPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast {
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 20px);
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 11.6px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
            backdrop-filter: blur(15px);
            text-align: center;
            max-width: 90%;
            word-break: break-all;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .copy-btn {
            background-color: var(--apple-blue);
            color: #fff;
            padding: 11.6px 30px;
            border-radius: 8px;
            margin: 15px auto 0;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        .label-text {
            display: block;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 6px;
            font-weight: 600;
            text-align: left;
            padding-left: 2px;
        }

        #qr-poster {
            background: rgba(52, 199, 89, 0.08);
            border: 1px solid rgba(52, 199, 89, 0.2);
            padding: 25px 20px 15px 20px;
            border-radius: var(--radius-card);
            display: none;
            margin: 10px auto 0 auto;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            position: relative;
            transition: var(--transition-base);
        }

        .qr-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 5px;
            border-radius: 16px;
            box-shadow: 0 4px 11.6px rgba(0,0,0,0.05);
            max-width: 100%;
            box-sizing: border-box;
        }

        #embedded-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--qr-info-bg);
            color: var(--qr-info-text);
            font-size: 11.6px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 0 0 2px var(--qr-info-border);
            z-index: 10;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tips-text {
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            margin: 6px auto 0 auto;
            font-size: 13px;
            color: var(--tips-text);
            line-height: 1.6;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 11.6px;
            border-radius: 16px;
            transition: var(--transition-base);
            word-break: break-all;
        }

        .footer-brand {
            text-align: center;
            font-size: 11.6px;
            color: #d2d2d7;
            margin-top: 11.6px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #copy-poster-btn {
            background: var(--apple-blue-gradient);
            color: white;
            padding: 14px 44px;
            font-size: 16px;
            margin-top: 20px;
            display: inline-block;
            min-width: 220px;
            box-sizing: border-box;
        }

        #qr-error {
            text-align: center;
            margin: 10px 0;
            color: #ff3b30;
            font-weight: 700;
            font-size: 15px;
        }

        .promo-text {
            text-align: center;
            margin-bottom: 15px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.6;
        }

        .promo-text-qr {
            margin-top: -5px;
            margin-bottom: 0;
        }

        .config-inline-panel {
            background: var(--inline-config-bg);
            border-radius: 11.6px;
            padding: 11.6px;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }

        .config-option-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
        }

        .config-option-row input {
            width: 14px;
            height: 14px;
            accent-color: var(--apple-blue);
            margin: 0;
        }

        @media (max-width: 600px) {
            body { align-items: flex-start; }
            .container { padding: 25px 20px; margin-top: 3vh; }
            textarea, input[type="text"], select { font-size: 16px !important; }
            .grid-row { flex-direction: column; gap: 0px; }
            h2 { font-size: 22px; margin-bottom: 20px; }
            .primary-btn { width: 100%; }
        }

        #img-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }

        #img-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        #modal-img-result {
            max-width: 85%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-tips {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-close-btn {
            margin-top: 25px;
            padding: 10px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" title="切换主题">🌙</button>
    <div id="toast" class="toast"></div>

    <div id="img-modal-overlay">
        <div class="modal-tips">👉 请长按下方图片保存或发给朋友</div>
        <img id="modal-img-result" src="" alt="海报渲染结果">
        <button class="modal-close-btn">关闭</button>
    </div>

    <div class="container">
        <img src="Zoo_Logo.jpg" alt="Zoo-Net Tools Logo" class="brand-logo">
        <h2>Zoo-Net Tools</h2>

        <div class="tab-container">
            <button class="tab-btn active" id="tab-qr">二维码生成</button>
            <button class="tab-btn" id="tab-sub">订阅转换</button>
        </div>

        <div id="section-qr">
            <label class="label-text" for="text-input">节点链接</label>
            <div class="text-input-container">
                <textarea id="text-input" placeholder="请输入节点链接，支持多链接合并生成..."></textarea>
                <button id="clear-qr" class="clear-btn" title="清空输入">×</button>
            </div>

            <div id="qr-error" class="hidden">
                🔞哒咩!你太长了!我受不了!<br>
                变短点再来!要不你去隔壁试试?<br>
                （文本过长或包含非法字符，核对精简后重试，批量内容请使用订阅转换）
            </div>

            <div id="qr-poster">
                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                    <div id="embedded-info" class="hidden"></div>
                </div>
                <div class="promo-text promo-text-qr">👇👇👇<br>🌎ZooDirector_<br>👍专注跨境出海网络</div>
                <div id="node-tips" class="tips-text hidden"></div>
                <div class="footer-brand">BY: ZOONET</div>
            </div>
            <button id="copy-poster-btn" class="btn hidden">📸 复制图片到剪贴板</button>
        </div>

        <div id="section-sub" class="hidden">
            <label class="label-text" for="sub-links">订阅链接</label>
            <div class="text-input-container">
                <textarea id="sub-links" placeholder="请输入订阅链接，支持多行输入..."></textarea>
                <button id="clear-sub" class="clear-btn" title="清空输入">×</button>
            </div>

            <div class="grid-row">
                <div class="grid-col">
                    <label class="label-text" for="sub-target">目标客户端</label>
                    <select id="sub-target">
                        <option value="clash">Clash (Mihomo/Meta)</option>
                        <option value="singbox">Sing-box</option>
                        <option value="shadowrocket">Shadowrocket</option>
                        <option value="v2ray">V2ray/Base64</option>
                        <option value="stash">Stash</option>
                        <option value="surge&ver=4">Surge 4/5</option>
                        <option value="loon">Loon</option>
                        <option value="surfboard">Surfboard</option>
                        <option value="quanx">Quantumult X</option>
                        <option value="mixed">通用订阅 (自动识别)</option>
                    </select>
                </div>
                <div class="grid-col">
                    <label class="label-text" for="sub-filename">订阅名称</label>
                    <input type="text" id="sub-filename" placeholder="自定义/可留空">
                </div>
            </div>

            <div class="advanced-toggle">⚙️ 高级设置 (新手保持默认) 🔽</div>
            <div id="advanced-settings" class="advanced-content">
                <div class="grid-row">
                    <div class="grid-col">

                                <option value="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini.ini">ACL4SSR_精简版 (手机推荐)</option>
                                <option value="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_NoAuto.ini">ACL4SSR_无测速 (手动选点)</option>
                                <option value="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_AdblockPlus.ini">ACL4SSR_加强去广告</option>

                            <optgroup label="--- zsokami 深度定制版 ---">

                                <option value="https://raw.githubusercontent.com/zsokami/ACL4SSR/main/ACL4SSR_Online_Mannix.ini">zsokami_精简版 (纯净列表)</option>
                            </optgroup>
                            <option value="custom">自定义远程配置...</option>
                        </select>
                        <input type="text" id="custom-config" class="hidden" placeholder="输入自定义远程配置链接 (以 .ini 结尾)">
                    </div>
                    <div class="grid-col">
                        <label class="label-text">其他配置</label>
                        <button type="button" class="btn" style="width:100%; height:48px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:var(--radius-btn); color:var(--text-main); font-size:14px; text-align:left; padding:0 16px;" id="btn-inline-config">参数微调</button>
                        <div id="inline-config-panel" class="config-inline-panel">
                            <div style="display: flex; gap: 20px;">
                                <div style="flex:1;">
                                    <label class="config-option-row"><input type="checkbox" id="chk-emoji" checked> Emoji</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-scv" checked> 跳过验证</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-udp" checked> 启用 UDP</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-expand" checked> 规则展开</label>
                                </div>
                                <div style="flex:1;">
                                    <label class="config-option-row"><input type="checkbox" id="chk-append-type"> 节点类型</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-sort"> 排序节点</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-fdn"> 过滤节点</label>
                                    <label class="config-option-row"><input type="checkbox" id="chk-special"> 去除符号</label>
                                </div>

                        </div>
                    </div>
                </div>
            </div>

            <button class="btn primary-btn" id="sub-gen-btn">🚀一键生成</button>

            <div id="sub-output-wrapper" style="display:none; margin-top:24px;">
                <div id="sub-promo" class="promo-text">👇👇👇<br>🌎ZooDirector_<br>👍专注跨境出海网络</div>
                <div id="sub-result">
                    <span id="res-title" style="font-size:13px; color:var(--apple-green); font-weight:700;">✨ 链接已成功生成：</span>
                    <input type="text" id="sub-output" readonly style="margin-top:10px; background:var(--bg-input);">
                    <button class="btn copy-btn">复制订阅地址</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ────────────────────────────────────────────────
        // DOM 缓存
        // ────────────────────────────────────────────────
        const DOM = {
            themeToggle: document.getElementById('theme-toggle'),
            toast: document.getElementById('toast'),
            textInput: document.getElementById('text-input'),
            qrDiv: document.getElementById('qrcode'),
            qrPoster: document.getElementById('qr-poster'),
            embeddedInfo: document.getElementById('embedded-info'),
            nodeTips: document.getElementById('node-tips'),
            qrError: document.getElementById('qr-error'),
            copyPosterBtn: document.getElementById('copy-poster-btn'),
            clearQrBtn: document.getElementById('clear-qr'),
            clearSubBtn: document.getElementById('clear-sub'),
            imgModal: document.getElementById('img-modal-overlay'),
            modalImg: document.getElementById('modal-img-result'),
            subLinks: document.getElementById('sub-links'),
            subTarget: document.getElementById('sub-target'),
            subFilename: document.getElementById('sub-filename'),
            subBackend: document.getElementById('sub-backend'),
            customBackend: document.getElementById('custom-backend'),
            subShortener: document.getElementById('sub-shortener'),
            customShortener: document.getElementById('custom-shortener'),
            subConfig: document.getElementById('sub-config'),
            customConfig: document.getElementById('custom-config'),
            subGenBtn: document.getElementById('sub-gen-btn'),
            subOutput: document.getElementById('sub-output'),
            subOutputWrapper: document.getElementById('sub-output-wrapper'),
            chkEmoji: document.getElementById('chk-emoji'),
            chkUdp: document.getElementById('chk-udp'),
            chkScv: document.getElementById('chk-scv'),
            chkAppendType: document.getElementById('chk-append-type'),
            chkSort: document.getElementById('chk-sort'),
            chkExpand: document.getElementById('chk-expand'),
            tabQr: document.getElementById('tab-qr'),
            tabSub: document.getElementById('tab-sub'),
            sectionQr: document.getElementById('sectionQr'),
            sectionQr: document.getElementById('section-qr'),
            sectionSub: document.getElementById('section-sub'),
            advancedToggle: document.querySelector('.advanced-toggle'),
            advancedContent: document.getElementById('advanced-settings'),
            modalCloseBtn: document.querySelector('.modal-close-btn'),
            copySubBtn: document.querySelector('.copy-btn'),
            btnInlineConfig: document.getElementById('btn-inline-config'),
            inlineConfigPanel: document.getElementById('inline-config-panel')
        };

        let isGenerating = false;
        let qrDebounceTimer = null;
        let toastTimer = null;

        // ────────────────────────────────────────────────
        // Toast 提示
        // ────────────────────────────────────────────────
        function showToast(msg) {
            if (!DOM.toast) return;
            DOM.toast.textContent = msg;
            DOM.toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => DOM.toast.classList.remove('show'), 3500);
        }

        // ────────────────────────────────────────────────
        // 主题切换
        // ────────────────────────────────────────────────
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            DOM.themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }
        DOM.themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            DOM.themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
        });

        // ────────────────────────────────────────────────
        // 节点名称提取
        // ────────────────────────────────────────────────
        function extractNodeName(text) {
            if (!text) return "";

            text = text.trim();
            if (!text.includes("#")) return "";

            try {
                let parts = text.split("#");
                let name = decodeURIComponent(parts[parts.length - 1]).trim();

                let segments = name.split('-').map(s => s.trim());

                if (segments.length < 3) return "";

                let firstSegment = segments[0];
                let firstCore = firstSegment.replace(/^[\[\]+*_\s-]+/, '').toLowerCase();

                const countryPrefixes = [
                    'us', 'usa', 'u.s', 'america',
                    'ca', 'canada',
                    'uk', 'gb', 'unitedkingdom',
                    'de', 'germany',
                    'fr', 'france',
                    'jp', 'japan',
                    'kr', 'korea', 'southkorea',
                    'sg', 'singapore',
                    'hk', 'hongkong',
                    'tw', 'taiwan',
                    'au', 'australia',
                    'nz', 'newzealand',
                    'ru', 'russia',
                    'in', 'india',
                    'br', 'brazil',
                    'za', 'southafrica',
                    'mx', 'mexico',
                    'nl', 'netherlands',
                    'se', 'sweden',
                    'no', 'norway',
                    'dk', 'denmark',
                    'fi', 'finland',
                    'it', 'italy',
                    'es', 'spain',
                    'pt', 'portugal',
                    'ch', 'switzerland',
                    'at', 'austria',
                    'pl', 'poland',
                    'cz', 'czech',
                    'ua', 'ukraine',
                    'tr', 'turkey',
                    'ae', 'uae',
                    'il', 'israel',
                    'ar', 'argentina',
                    'cl', 'chile',
                    'ie', 'ireland',
                    'gr', 'greece',
                    'my', 'malaysia',
                    'th', 'thailand',
                    'vn', 'vietnam',
                    'id', 'indonesia',
                    'ph', 'philippines'
                ];

                let isValidFirst = countryPrefixes.some(prefix => firstCore === prefix || firstCore.startsWith(prefix));
                if (!isValidFirst) return "";

                let thirdSegment = segments[2];
                if (!/\d/.test(thirdSegment) || thirdSegment.includes('-')) return "";

                return segments.slice(0, 3).join('-');
            } catch (e) {
                return "";
            }
        }

        // ────────────────────────────────────────────────
        // QR 生成与清除逻辑 (修复版)
        // ────────────────────────────────────────────────
        function generateQR() {
            const rawText = DOM.textInput.value.trim();
            if (!rawText) {
                DOM.qrPoster.style.display = "none";
                DOM.copyPosterBtn.classList.add('hidden');
                DOM.qrError.classList.add('hidden');
                return;
            }

            if (typeof QRCode === 'undefined' || !window.libsReady) return;

            if (rawText.length > 2000) {
                DOM.qrError.classList.remove('hidden');
                DOM.qrPoster.style.display = "none";
                DOM.copyPosterBtn.classList.add('hidden');
                return;
            }

            DOM.qrDiv.innerHTML = "";
            DOM.qrError.classList.add('hidden');

            try {
                let ecLevel = QRCode.CorrectLevel.M;
                const len = rawText.length;
                if (len < 120) ecLevel = QRCode.CorrectLevel.H;
                else if (len < 220) ecLevel = QRCode.CorrectLevel.Q;
                else if (len < 350) ecLevel = QRCode.CorrectLevel.M;

                const size = window.innerWidth > 600 ? 380 : 260;

                new QRCode(DOM.qrDiv, {
                    text: rawText,
                    width: size,
                    height: size,
                    correctLevel: ecLevel
                });

                if (DOM.qrDiv.children.length === 0) throw new Error("生成失败");

                const nodeName = extractNodeName(rawText.split('\n')[0] || "");
                if (nodeName) {
                    DOM.nodeTips.classList.remove('hidden');
                    DOM.nodeTips.innerHTML = `<strong style="color:var(--text-main);">⚡TIPS（注意事项）:</strong><br>本人所提供节点命名格式为<br>（国家-用户名-暂停日期）<br>仅用作备注标识，可自行更改`;
                    DOM.embeddedInfo.textContent = nodeName;
                    DOM.embeddedInfo.classList.remove('hidden');
                } else {
                    DOM.nodeTips.classList.add('hidden');
                    DOM.embeddedInfo.textContent = "ZooNet";
                    DOM.embeddedInfo.classList.remove('hidden');
                }

                DOM.qrPoster.style.display = "block";
                DOM.copyPosterBtn.classList.remove('hidden');
            } catch (e) {
                DOM.qrPoster.style.display = "none";
                DOM.copyPosterBtn.classList.add('hidden');
                DOM.qrError.classList.remove('hidden');
            }
        }

        // 核心修复1：使用 CSS class 来配合伪类，移除暴力覆盖的内联 display 属性
        function updateClearQrBtn() {
            const container = DOM.textInput.closest('.text-input-container');
            if (DOM.textInput.value.length > 0) {
                container.classList.add('has-content');
            } else {
                container.classList.remove('has-content');
            }
            DOM.clearQrBtn.style.display = ''; // 移交控制权给 CSS
        }

        DOM.textInput.addEventListener('input', () => {
            updateClearQrBtn();
            localStorage.setItem('qr_cache', DOM.textInput.value);
            clearTimeout(qrDebounceTimer);
            qrDebounceTimer = setTimeout(generateQR, 280);
        });

        // 核心修复2：点击清除后，强制拉回焦点继续输入
        DOM.clearQrBtn.addEventListener('click', () => {
            DOM.textInput.value = '';
            updateClearQrBtn();
            localStorage.removeItem('qr_cache');
            generateQR();
            DOM.textInput.focus(); // 保持选中状态
        });

        // ────────────────────────────────────────────────
        // 订阅输入框清除逻辑 (修复版)
        // ────────────────────────────────────────────────
        function updateClearSubBtn() {
            const container = DOM.subLinks.closest('.text-input-container');
            if (DOM.subLinks.value.length > 0) {
                container.classList.add('has-content');
            } else {
                container.classList.remove('has-content');
            }
            DOM.clearSubBtn.style.display = ''; // 移交控制权给 CSS
        }

        DOM.subLinks.addEventListener('input', () => {
            updateClearSubBtn();
        });

        DOM.clearSubBtn.addEventListener('click', () => {
            DOM.subLinks.value = '';
            updateClearSubBtn();
            DOM.subLinks.focus(); // 保持选中状态
        });

        // 初始化按钮状态
        updateClearSubBtn();

        // ────────────────────────────────────────────────
        // 订阅配置持久化
        // ────────────────────────────────────────────────
        function saveSubConfig() {
            const config = {
                target: DOM.subTarget?.value,
                backend: DOM.subBackend?.value,
                shortener: DOM.subShortener?.value,
                filename: DOM.subFilename?.value,
                emoji: DOM.chkEmoji?.checked,
                udp: DOM.chkUdp?.checked,
                scv: DOM.chkScv?.checked,
                append_type: DOM.chkAppendType?.checked,
                sort: DOM.chkSort?.checked,
                expand: DOM.chkExpand?.checked
            };
            localStorage.setItem('zoo_sub_config', JSON.stringify(config));
        }

        function loadSubConfig() {
            try {
                const saved = localStorage.getItem('zoo_sub_config');
                if (saved) {
                    const c = JSON.parse(saved);
                    if (c.target && DOM.subTarget) DOM.subTarget.value = c.target;
                    if (c.backend && DOM.subBackend) DOM.subBackend.value = c.backend;
                    if (c.shortener && DOM.subShortener) DOM.subShortener.value = c.shortener;
                    if (c.filename && DOM.subFilename) DOM.subFilename.value = c.filename;
                    if ('emoji' in c && DOM.chkEmoji) DOM.chkEmoji.checked = !!c.emoji;
                    if ('udp' in c && DOM.chkUdp) DOM.chkUdp.checked = !!c.udp;
                    if ('scv' in c && DOM.chkScv) DOM.chkScv.checked = !!c.scv;
                    if ('append_type' in c && DOM.chkAppendType) DOM.chkAppendType.checked = !!c.append_type;
                    if ('sort' in c && DOM.chkSort) DOM.chkSort.checked = !!c.sort;
                    if ('expand' in c && DOM.chkExpand) DOM.chkExpand.checked = !!c.expand;
                }
            } catch (e) {
                console.warn("订阅配置加载失败", e);
            }
        }

        loadSubConfig();

        const subControls = [
            DOM.subTarget, DOM.subBackend, DOM.subShortener, DOM.subFilename,
            DOM.chkEmoji, DOM.chkUdp, DOM.chkScv, DOM.chkAppendType,
            DOM.chkSort, DOM.chkExpand
        ].filter(Boolean);

        subControls.forEach(el => el.addEventListener('change', saveSubConfig));

        // ────────────────────────────────────────────────
        // 复制订阅地址
        // ────────────────────────────────────────────────
        async function copySubText() {
            if (!DOM.subOutput.value) return;
            try {
                await navigator.clipboard.writeText(DOM.subOutput.value);
                showToast("✨ 订阅地址已复制");
            } catch {
                DOM.subOutput.select();
                document.execCommand('copy');
                showToast("✨ 订阅地址已复制（旧方式）");
            }
        }

        // ────────────────────────────────────────────────
        // 一键生成订阅
        // ────────────────────────────────────────────────
        async function generateSub() {
            if (isGenerating) return;
            isGenerating = true;
            const btn = DOM.subGenBtn;
            const orig = btn.innerText;
            btn.innerText = "⏳ 生成中...";
            btn.disabled = true;

            try {
                const raw = DOM.subLinks.value.trim();
                if (!raw) throw new Error("请输入订阅链接");

                const links = raw.split('\n').join('|');
                const filename = DOM.subFilename.value.trim() || (extractNodeName(raw.split('\n')[0]) || "ZooNet_Sub");

                let backend = DOM.subBackend.value === 'custom' ? DOM.customBackend.value : DOM.subBackend.value;
                let config = DOM.subConfig.value === 'custom' ? DOM.customConfig.value : DOM.subConfig.value;

                const params = new URLSearchParams({
                    url: links,
                    filename,
                    emoji: DOM.chkEmoji?.checked ?? true,
                    udp: DOM.chkUdp?.checked ?? true,
                    scv: DOM.chkScv?.checked ?? true,
                    append_type: DOM.chkAppendType?.checked ?? false,
                    sort: DOM.chkSort?.checked ?? false,
                    expand: DOM.chkExpand?.checked ?? true,
                    new_name: 'true',
                    flag: 'clash meta',
                    dev: 'true'
                });

                if (DOM.subTarget.value !== 'mixed') {
                    params.set('target', DOM.subTarget.value);
                }

                if (config) params.append('config', config);

                let url = backend;
                if (backend.includes('?')) {
                    url += backend.endsWith('?') ? '' : '&';
                } else {
                    url += '?';
                }
                url += params.toString();

                if (url.includes('tuic')) {
                    url = url.replace(/%253A/g, ':').replace(/%3A/g, ':');
                }

                let finalUrl = url;
                const shortener = DOM.subShortener.value === 'custom' ? DOM.customShortener.value : DOM.subShortener.value;

                if (shortener !== "none" && shortener) {
                    btn.innerText = "⏳ 正在生成短链...";

                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 8000);

                        if (shortener === "tinyurl" || shortener === "isgd") {
                            let apiEndpoint = shortener === "tinyurl" 
                                ? "https://tinyurl.com/api-create.php?url=" 
                                : "https://is.gd/create.php?format=simple&url=";
                            let proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(apiEndpoint + encodeURIComponent(url));
                            
                            let response = await fetch(proxyUrl, { signal: controller.signal });
                            let json = await response.json();
                            clearTimeout(timeoutId);
                            
                            if (json.contents && json.contents.trim().startsWith("http")) {
                                finalUrl = json.contents.trim();
                                showToast(`✔️ ${shortener === "tinyurl" ? "TinyURL" : "is.gd"} 代理生成成功!`);
                            } else {
                                throw new Error("接口被墙或代理返回异常");
                            }
                        } 
                        else if (shortener.includes("url=")) {
                            let response = await fetch(shortener + encodeURIComponent(url), { signal: controller.signal });
                            let text = await response.text();
                            clearTimeout(timeoutId);
                            finalUrl = text.trim().startsWith("http") ? text.trim() : url;
                            if (finalUrl !== url) showToast("✔️ GET短链生成成功!");
                        } 
                        else {
                            let formData = new FormData();
                            formData.append("longUrl", btoa(unescape(encodeURIComponent(url))));

                            let response = await fetch(shortener, {
                                method: 'POST',
                                body: formData,
                                signal: controller.signal
                            });
                            let json = await response.json();
                            clearTimeout(timeoutId);
                            
                            if (json.Code === 1 && json.ShortUrl) {
                                finalUrl = json.ShortUrl;
                                showToast("✔️ 短链生成成功!");
                            } else {
                                throw new Error(json.Message || "可能遭遇拦截");
                            }
                        }
                    } catch (error) {
                        console.error("短链服务报错: ", error);
                        let errMsg = error.name === 'AbortError' ? "请求超时" : (error.message || "").substring(0,8);
                        showToast(`⚠️ 短链受阻(${errMsg}...)，已回退长链`);
                        finalUrl = url;
                    }
                } else {
                    showToast("✔️ 订阅生成成功!");
                }

                DOM.subOutput.value = finalUrl;
                DOM.subOutputWrapper.style.display = "block";
                DOM.subOutputWrapper.classList.add('flash-update');
            } catch (e) {
                showToast("❌ " + (e.message || "生成失败，请检查输入"));
            } finally {
                isGenerating = false;
                btn.innerText = orig;
                btn.disabled = false;
            }
        }

        // ────────────────────────────────────────────────
        // 海报复制
        // ────────────────────────────────────────────────
        async function copyPoster() {
            if (!window.libsReady || typeof html2canvas === 'undefined') {
                showToast("⏳ 渲染引擎加载中...");
                return;
            }

            const btn = DOM.copyPosterBtn;
            const poster = DOM.qrPoster;
            btn.innerText = "⏳ 正在渲染海报...";

            try {
                const canvas = await html2canvas(poster, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: document.documentElement.getAttribute('data-theme') === 'dark' ? '#1c1c1e' : '#ffffff'
                });

                const isWechat = /MicroMessenger/i.test(navigator.userAgent);
                const hasClipboard = navigator.clipboard && window.ClipboardItem;

                if (isWechat || !hasClipboard) {
                    DOM.modalImg.src = canvas.toDataURL("image/png");
                    DOM.imgModal.classList.add('show');
                } else {
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                        showToast("✨ 图片已复制到剪贴板");
                        poster.classList.add('success-flash-blink');
                    } catch (clipErr) {
                        console.warn("剪贴板写入失败 → 降级弹窗", clipErr);
                        DOM.modalImg.src = canvas.toDataURL("image/png");
                        DOM.imgModal.classList.add('show');
                        showToast("已生成图片，请长按保存");
                    }
                }
            } catch (err) {
                console.error("渲染失败", err);
                showToast("❌ 图片生成失败");
            } finally {
                btn.innerText = "📸 复制图片到剪贴板";
            }
        }

        // ────────────────────────────────────────────────
        // 所有事件绑定
        // ────────────────────────────────────────────────
        if (DOM.copySubBtn) {
            DOM.copySubBtn.addEventListener('click', copySubText);
        }

        if (DOM.tabQr && DOM.tabSub) {
            DOM.tabQr.addEventListener('click', () => {
                DOM.tabQr.classList.add('active');
                DOM.tabSub.classList.remove('active');
                DOM.sectionQr.classList.remove('hidden');
                DOM.sectionSub.classList.add('hidden');
            });

            DOM.tabSub.addEventListener('click', () => {
                DOM.tabSub.classList.add('active');
                DOM.tabQr.classList.remove('active');
                DOM.sectionSub.classList.remove('hidden');
                DOM.sectionQr.classList.add('hidden');
            });
        }

        if (DOM.advancedToggle && DOM.advancedContent) {
            DOM.advancedToggle.addEventListener('click', () => {
                const isVisible = DOM.advancedContent.style.display === 'block';
                DOM.advancedContent.style.display = isVisible ? 'none' : 'block';
                DOM.advancedToggle.textContent = isVisible 
                    ? '⚙️ 高级设置 (新手保持默认) 🔽' 
                    : '⚙️ 高级设置 (新手保持默认) 🔼';
            });
        }

        if (DOM.modalCloseBtn) {
            DOM.modalCloseBtn.addEventListener('click', () => {
                DOM.imgModal.classList.remove('show');
            });
        }

        if (DOM.btnInlineConfig && DOM.inlineConfigPanel) {
            DOM.btnInlineConfig.addEventListener('click', () => {
                const isVisible = DOM.inlineConfigPanel.style.display === 'block';
                DOM.inlineConfigPanel.style.display = isVisible ? 'none' : 'block';
            });
        }

        ['backend', 'shortener', 'config'].forEach(type => {
            const selectEl = DOM['sub' + type.charAt(0).toUpperCase() + type.slice(1)];
            const customEl = DOM['custom' + type.charAt(0).toUpperCase() + type.slice(1)];
            if (selectEl && customEl) {
                selectEl.addEventListener('change', (e) => {
                    customEl.classList.toggle('hidden', e.target.value !== 'custom');
                });
                customEl.classList.toggle('hidden', selectEl.value !== 'custom');
            }
        });

        if (DOM.subGenBtn) DOM.subGenBtn.addEventListener('click', generateSub);
        if (DOM.copyPosterBtn) DOM.copyPosterBtn.addEventListener('click', copyPoster);

        // ────────────────────────────────────────────────
        // 初始化
        // ────────────────────────────────────────────────
        window.libsReadyPromise = libsPromise;

        libsPromise.then(() => {
            const cache = localStorage.getItem('qr_cache');
            if (cache) {
                DOM.textInput.value = cache;
                updateClearQrBtn();
                generateQR();
            }
        });

        console.log("%cZoo-Net Tools – 已完成所有修复，可直接发布", "color:#34c759;font-weight:bold;font-size:14px");
    });
    </script>
</body>
</html>
